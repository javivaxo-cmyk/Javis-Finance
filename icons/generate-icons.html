<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generate PNG icons</title>
<style>
  body { font-family: system-ui, sans-serif; background:#0f172a; color:#e2e8f0; padding:24px; }
  button, a.btn { display:inline-block; background:#22c55e; color:#06210f; padding:10px 16px;
    border:0; border-radius:10px; font-weight:700; text-decoration:none; cursor:pointer; margin:4px; }
  canvas { background:#000; margin:12px; border-radius:16px; }
  .row { display:flex; flex-wrap:wrap; align-items:center; }
</style>
</head>
<body>
<h1>Icon generator</h1>
<p>This converts <code>icon.svg</code> into the PNG files the manifest expects.
Click each download button, save the file into this <code>icons/</code> folder with the exact name shown.</p>
<div class="row">
  <div>
    <canvas id="c192" width="192" height="192"></canvas><br>
    <a class="btn" id="d192" download="icon-192.png">Download icon-192.png</a>
  </div>
  <div>
    <canvas id="c512" width="512" height="512"></canvas><br>
    <a class="btn" id="d512" download="icon-512.png">Download icon-512.png</a>
  </div>
</div>
<script>
  // Load the existing SVG icon and rasterize it at two sizes.
  function draw(size, canvasId, linkId) {
    const canvas = document.getElementById(canvasId);
    const ctx = canvas.getContext("2d");
    const img = new Image();
    img.onload = () => {
      ctx.clearRect(0, 0, size, size);
      ctx.drawImage(img, 0, 0, size, size);
      document.getElementById(linkId).href = canvas.toDataURL("image/png");
    };
    img.src = "icon.svg";
  }
  draw(192, "c192", "d192");
  draw(512, "c512", "d512");
</script>
</body>
</html>
